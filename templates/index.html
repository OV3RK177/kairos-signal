
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>KAIROS OPTIMUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #0a0a0a; --border: #222; --text: #ccc; }
        body { background: var(--bg); color: var(--text); font-family: monospace; overflow: hidden; }
        .card { background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; }
        .frame-head { font-size: 10px; font-weight: bold; color: #555; padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .grid-box { overflow-y: auto; flex: 1; padding: 4px; }
        .cell { padding: 6px 8px; border-bottom: 1px solid #151515; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .cell:hover { background: #111; color: #fff; }
        .cell.active { background: #1e293b; border-left: 2px solid #3b82f6; }
        .val-pos { color: #10b981; } .val-neg { color: #ef4444; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2">

    <div class="h-10 card flex-row items-center px-4 justify-between shrink-0">
        <div class="font-bold text-lg text-white tracking-widest">KAIROS<span class="text-blue-600">OPTIMUM</span></div>
        <div class="flex gap-4 text-[10px] font-bold text-gray-500" id="infra-bar">Initializing...</div>
        <div class="text-[10px] text-green-500 font-bold">● LIVE</div>
    </div>

    <div class="flex-1 grid grid-cols-12 gap-2 overflow-hidden min-h-0">
        
        <div class="col-span-9 flex flex-col gap-2 h-full min-h-0">
            <div class="card flex-1 relative p-2 min-h-0">
                <div class="flex justify-between items-start mb-1 px-2">
                    <span class="text-[10px] font-bold text-gray-500">ALPHA CORRELATION (48H)</span>
                    <div id="chart-legend" class="flex gap-2 text-[10px]"></div>
                </div>
                <div class="flex-1 relative w-full h-full"><canvas id="chart"></canvas></div>
            </div>

            <div class="flex-1 grid grid-cols-3 gap-2 min-h-0">
                <div class="card"><div class="frame-head">MACRO</div><div id="macro-grid" class="grid-box">Loading...</div></div>
                <div class="card"><div class="frame-head">COMPUTE</div><div id="compute-grid" class="grid-box">Loading...</div></div>
                <div class="card"><div class="frame-head text-green-500">MOVERS</div><div id="gainers-grid" class="grid-box">Loading...</div></div>
            </div>

            <div class="card h-24 p-2 flex flex-col shrink-0">
                <div class="text-[10px] font-bold text-blue-500 mb-1">INTELLIGENCE</div>
                <div id="ai-out" class="flex-1 overflow-y-auto text-[11px] text-gray-300 mb-1 font-sans border border-[#1a1a1a] p-2 rounded bg-[#080808]">Ready.</div>
                <div class="flex gap-2 h-6">
                    <input id="ai-in" class="flex-1 bg-[#111] border border-[#222] px-2 text-[11px] text-white" placeholder="Query...">
                    <button onclick="ask()" class="bg-blue-600 px-3 text-[10px] font-bold text-white hover:bg-blue-500">RUN</button>
                </div>
            </div>
        </div>

        <div class="col-span-3 card flex flex-col h-full min-h-0">
            <div class="p-2 border-b border-[#222] flex justify-between items-center bg-[#080808] shrink-0">
                <span class="text-[10px] font-bold text-gray-500">ASSET STREAM</span>
                <span class="text-[10px] mono text-blue-500" id="count">0</span>
            </div>
            <div id="matrix-box" class="flex-1 overflow-y-auto min-h-0" onscroll="checkScroll()">
                <div id="matrix-list"></div>
                <div id="loader" class="text-center py-2 text-[10px] text-gray-600 hidden">LOADING...</div>
            </div>
        </div>

    </div>

    <script>
        let page=1, isLoading=false, selected=new Set(['NVDA', 'BTC']);
        const ctx = document.getElementById('chart').getContext('2d');
        let chart = new Chart(ctx, { type: 'line', data: { datasets: [] }, options: { responsive: true, maintainAspectRatio: false, elements: { point: { radius: 0 }, line: { borderWidth: 2 } }, scales: { x: { display: false }, y: { grid: { color: '#1a1a1a' } } }, plugins: { legend: { display: false } } } });

        function renderRow(a) {
            const c = a.change >= 0 ? 'val-pos' : 'val-neg';
            const s = a.change >= 0 ? '+' : '';
            const act = selected.has(a.id) ? 'active' : '';
            return `<div class="cell ${act}" id="cell-${a.id}" onclick="toggle('${a.id}')"><div><span class="font-bold text-xs text-white">${a.id.substring(0,10)}</span></div><div class="text-right"><span class="text-gray-400 text-[10px]">$${a.price.toLocaleString()}</span> <span class="text-[9px] font-bold ${c}">${s}${a.change.toFixed(2)}%</span></div></div>`;
        }

        async function loadMatrix() {
            if(isLoading) return; isLoading=true;
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/matrix?page=${page}`);
                const data = await res.json();
                if(data.length > 0) {
                    data.forEach(a => {
                        const div = document.createElement('div'); div.innerHTML = renderRow(a);
                        document.getElementById('matrix-list').appendChild(div.firstChild);
                    });
                    page++; document.getElementById('count').innerText = document.getElementById('matrix-list').children.length;
                }
            } catch(e) {}
            isLoading=false; document.getElementById('loader').classList.add('hidden');
        }

        async function loadFrame(type, id) {
            try {
                const res = await fetch(`/api/frame/${type}`);
                const data = await res.json();
                document.getElementById(id).innerHTML = data.map(renderRow).join('');
            } catch(e) {}
        }

        function checkScroll() { const b = document.getElementById('matrix-box'); if(b.scrollTop + b.clientHeight >= b.scrollHeight - 50) loadMatrix(); }
        
        function toggle(id) {
            if(selected.has(id)) selected.delete(id); else { if(selected.size>=5) return; selected.add(id); }
            document.querySelectorAll('.cell').forEach(e => e.classList.remove('active'));
            selected.forEach(s => { const el = document.getElementById(`cell-${s}`); if(el) el.classList.add('active'); });
            updateChart();
        }

        async function updateChart() {
            if(selected.size===0) return;
            try {
                const res = await fetch(`/api/chart?ids=${Array.from(selected).join(',')}`);
                const data = await res.json();
                const colors = ['#10b981', '#3b82f6', '#f97316', '#a855f7', '#ef4444'];
                chart.data = { labels: data.labels, datasets: data.datasets.map((d,i)=>({...d, borderColor: colors[i%5]})) };
                chart.update();
                document.getElementById('chart-legend').innerHTML = data.datasets.map((d,i)=>`<span style="color:${colors[i%5]}">● ${d.label}</span>`).join(' ');
            } catch(e) {}
        }

        async function updateInfra() {
            try {
                const d = await (await fetch('/api/stats')).json();
                document.getElementById('infra-bar').innerHTML = Object.entries(d.infra||{}).map(([k,v])=>`<span class="text-blue-500">${k}: <span class="text-white">${parseInt(v).toLocaleString()}</span></span>`).join(' | ');
            } catch(e) {}
        }

        async function ask() {
            const q = document.getElementById('ai-in').value;
            const res = await fetch('/api/ask', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, context:`Watching ${Array.from(selected)}`})});
            const d = await res.json();
            document.getElementById('ai-out').innerHTML = marked.parse(d.response);
        }

        async function init() {
            await loadFrame('macro', 'macro-grid');
            await loadFrame('compute', 'compute-grid');
            await loadFrame('gainers', 'gainers-grid');
            loadMatrix(); updateChart(); updateInfra();
        }

        init(); setInterval(updateInfra, 10000);
        document.getElementById('ai-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') ask(); });
    </script>
</body>
</html>
